<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pretty Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      color: #333;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
    }

    header h1 {
      font-weight: 700;
      color: #444;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #555;
      font-weight: 500;
      transition: 0.3s;
    }

    nav a:hover {
      color: #000;
    }

    .hero {
      height: 90vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero h2 {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .hero p {
      font-size: 1.2rem;
      margin-bottom: 25px;
      color: #555;
    }

    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: #6c63ff;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #5848d6;
    }

    .cards {
      display: flex;
      gap: 20px;
      padding: 60px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 250px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(255,255,255,0.6);
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <header>
    <h1>MySite</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <div>
      <h2>Welcome to Your Pretty Website ✨</h2>
      <p>Simple, clean, and modern design using just HTML & CSS.</p>
      <button class="btn">Get Started</button>
    </div>
  </section>

  <section class="cards">
    <div class="card">
      <h3>Fast</h3>
      <p>Lightweight and smooth performance.</p>
    </div>
    <div class="card">
      <h3>Responsive</h3>
      <p>Works on phones, tablets, and desktops.</p>
    </div>
    <div class="card">
      <h3>Modern</h3>
      <p>Minimal design with soft colors.</p>
    </div>
  </section>

  <footer>
    <p>© 2026 MySite. All rights reserved.</p>
  </footer>

</body>
</html>
